# Mosquitto MQTT Broker Configuration — mini-sdv-platform Milestone 2
# ──────────────────────────────────────────────────────────────────────────────
#
# SDV Concept:
#   In a production V2C (Vehicle-to-Cloud) pipeline, this broker role is
#   played by a managed cloud MQTT endpoint:
#     AWS IoT Core    → port 8883 (MQTT over TLS)
#     Azure IoT Hub   → port 8883 (MQTT over TLS)
#     HiveMQ Cloud    → port 8883 (MQTT over TLS)
#
#   Mosquitto running locally is a drop-in replacement with identical MQTT
#   semantics. The mqtt-bridge service requires zero code changes to point
#   at a real cloud broker — only MQTT_HOST / MQTT_PORT env vars change.
#
# Known limitations (documented in TRD, C10–C11):
#   • Plain text (port 1883, no TLS) — acceptable for M2 local simulation
#   • Anonymous access — no credentials required
#   Both will be addressed in a security-focused milestone.

# Bind to all interfaces on port 1883 (standard unencrypted MQTT)
listener 1883

# Allow connections without username/password.
# In production: set allow_anonymous false and configure a password file
# or use certificate-based mutual TLS (mTLS) authentication.
allow_anonymous true
