# Mosquitto MQTT Broker Configuration — M10: TLS/mTLS
# ──────────────────────────────────────────────────────────────────────────────
#
# M10 change: port 1883 (plain text) → port 8883 (TLS only).
# DR-103: no backwards-compatible plain-text listener.
#
# SDV Context:
#   Production cloud MQTT endpoints (AWS IoT Core, Azure IoT Hub, HiveMQ Cloud)
#   exclusively use port 8883 with TLS. This config makes Mosquitto match that
#   production behaviour exactly — only MQTT_HOST / MQTT_PORT env vars differ.
#
# mTLS (mutual TLS, DR-104):
#   require_certificate true forces every client to present a certificate.
#   Mosquitto verifies it against ca.crt — establishing WHO is connecting, not
#   just that the connection is encrypted. Clients without a cert are rejected.

listener 8883

cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key

# mTLS: reject any client that does not present a valid certificate
require_certificate true
allow_anonymous false
# Use the certificate CN as the MQTT username (required with allow_anonymous false + mTLS)
use_identity_as_username true
# M11: Role-Based Access Control — per-service topic permissions
acl_file /mosquitto/config/acl
# Log ACL denials (notice level) for observability
log_type error
log_type warning
log_type notice
