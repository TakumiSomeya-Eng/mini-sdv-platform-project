apiVersion: 1

datasources:
  - name: InfluxDB
    uid: influxdb-sdv
    type: influxdb
    access: proxy
    url: http://localhost:8086
    jsonData:
      version: Flux
      organization: sdv-org
      defaultBucket: sdv
      tlsSkipVerify: true
    secureJsonData:
      token: sdv-token-local
    isDefault: true
    editable: false
