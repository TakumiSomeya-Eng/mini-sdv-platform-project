apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    uid: tempo-sdv
    url: http://localhost:3200
    access: proxy
    jsonData:
      tracesToMetrics:
        datasourceUid: influxdb-sdv
        tags:
          - key: vehicle.id
            value: vehicle_id
      # M18: Trace → Profile correlation (Tempo ↔ Pyroscope)
      tracesToProfiles:
        datasourceUid: pyroscope-sdv
        tags:
          - key: service.name
            value: service_name
        profileTypeId: process_cpu:cpu:nanoseconds:cpu:nanoseconds
        customQuery: false
