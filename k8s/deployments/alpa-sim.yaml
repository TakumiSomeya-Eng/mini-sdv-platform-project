---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alpa-sim-config
  namespace: sdv
data:
  INFLUXDB_URL: "http://localhost:8086"
  INFLUXDB_TOKEN: "sdv-token-local"
  INFLUXDB_ORG: "sdv-org"
  INFLUXDB_BUCKET: "sdv"
  MQTT_HOST: "localhost"
  MQTT_PORT: "8883"
  MQTT_TLS: "true"
  MQTT_CA_CERT: "/certs/ca.crt"
  MQTT_CLIENT_CERT: "/certs/client.crt"
  MQTT_CLIENT_KEY: "/certs/client.key"
  PORT: "8092"
  DEFAULT_EPISODES: "5"
  OTA_COLLISION_GATE: "0.05"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alpa-sim
  namespace: sdv
  labels:
    app: alpa-sim
    milestone: m16
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alpa-sim
  template:
    metadata:
      labels:
        app: alpa-sim
    spec:
      hostNetwork: true
      dnsPolicy: Default
      containers:
        - name: alpa-sim
          image: localhost:5000/sdv/alpa-sim:latest
          envFrom:
            - configMapRef:
                name: alpa-sim-config
          volumeMounts:
            - name: tls-certs
              mountPath: /certs
              readOnly: true
      volumes:
        - name: tls-certs
          secret:
            secretName: tls-certs
