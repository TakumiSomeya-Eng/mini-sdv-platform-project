apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-config
  namespace: sdv
data:
  DATABROKER_HOST: "localhost"
  DATABROKER_PORT: "55555"
  MQTT_HOST: "localhost"
  MQTT_PORT: "8883"
  VEHICLE_ID: "vehicle-001"
  MQTT_TLS: "true"
  MQTT_CA_CERT: "/certs/ca.crt"
  MQTT_CLIENT_CERT: "/certs/dashboard.crt"
  MQTT_CLIENT_KEY: "/certs/dashboard.key"
  HOME: "/tmp"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: sdv
  labels:
    app: dashboard
    milestone: m1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      hostNetwork: true
      dnsPolicy: Default
      containers:
        - name: dashboard
          image: localhost:5000/sdv/dashboard:latest
          envFrom:
            - configMapRef:
                name: dashboard-config
          volumeMounts:
            - name: tls-certs
              mountPath: /certs
              readOnly: true
      volumes:
        - name: tls-certs
          secret:
            secretName: tls-certs
