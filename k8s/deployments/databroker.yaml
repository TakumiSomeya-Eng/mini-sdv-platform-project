apiVersion: apps/v1
kind: Deployment
metadata:
  name: databroker
  namespace: sdv
  labels:
    app: databroker
    milestone: m1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: databroker
  template:
    metadata:
      labels:
        app: databroker
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: databroker
          image: ghcr.io/eclipse-kuksa/kuksa-databroker:0.4.4
          args: ["--vss", "/vss/vss_mini_covesa.json", "--insecure"]
          volumeMounts:
            - name: vss-config
              mountPath: /vss
              readOnly: true
      volumes:
        - name: vss-config
          hostPath:
            path: /var/lib/sdv/config/vss
            type: Directory
