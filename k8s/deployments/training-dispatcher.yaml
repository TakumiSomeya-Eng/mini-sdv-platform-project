---
apiVersion: v1
kind: ConfigMap
metadata:
  name: training-dispatcher-config
  namespace: sdv
data:
  MQTT_HOST: "localhost"
  MQTT_PORT: "8883"
  MQTT_TLS: "true"
  MQTT_CA_CERT: "/certs/ca.crt"
  MQTT_CLIENT_CERT: "/certs/client.crt"
  MQTT_CLIENT_KEY: "/certs/client.key"
  PORT: "8090"
  POLL_INTERVAL_SEC: "15"
  MAX_POLL_ATTEMPTS: "80"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-dispatcher
  namespace: sdv
  labels:
    app: training-dispatcher
    milestone: m15
spec:
  replicas: 1
  selector:
    matchLabels:
      app: training-dispatcher
  template:
    metadata:
      labels:
        app: training-dispatcher
    spec:
      hostNetwork: true
      dnsPolicy: Default
      containers:
        - name: training-dispatcher
          image: localhost:5000/sdv/training-dispatcher:latest
          envFrom:
            - configMapRef:
                name: training-dispatcher-config
          env:
            - name: RUNPOD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: runpod-secrets
                  key: RUNPOD_API_KEY
                  optional: true
            - name: RUNPOD_ENDPOINT_ID
              valueFrom:
                secretKeyRef:
                  name: runpod-secrets
                  key: RUNPOD_ENDPOINT_ID
                  optional: true
          volumeMounts:
            - name: tls-certs
              mountPath: /certs
              readOnly: true
      volumes:
        - name: tls-certs
          secret:
            secretName: tls-certs
