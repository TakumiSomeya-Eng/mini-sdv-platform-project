---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scene-search-config
  namespace: sdv
data:
  MQTT_HOST: "localhost"
  MQTT_PORT: "8883"
  MQTT_TLS: "true"
  MQTT_CA_CERT: "/certs/ca.crt"
  MQTT_CLIENT_CERT: "/certs/client.crt"
  MQTT_CLIENT_KEY: "/certs/client.key"
  VEHICLE_ID: "vehicle-001"
  LANCEDB_PATH: "/data/scenes.lance"
  EMBED_MODEL: "all-MiniLM-L6-v2"
  PORT: "8093"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scene-search
  namespace: sdv
  labels:
    app: scene-search
    milestone: m17
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scene-search
  template:
    metadata:
      labels:
        app: scene-search
    spec:
      hostNetwork: true
      dnsPolicy: Default
      containers:
        - name: scene-search
          image: localhost:5000/sdv/scene-search:latest
          envFrom:
            - configMapRef:
                name: scene-search-config
          volumeMounts:
            - name: tls-certs
              mountPath: /certs
              readOnly: true
            - name: lancedb-data
              mountPath: /data
      volumes:
        - name: tls-certs
          secret:
            secretName: tls-certs
        - name: lancedb-data
          hostPath:
            path: /opt/sdv/data/lancedb
            type: DirectoryOrCreate
