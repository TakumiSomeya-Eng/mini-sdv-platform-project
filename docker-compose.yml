# mini-sdv-platform — Milestone 2: MQTT Cloud Bridge
# ──────────────────────────────────────────────────────────────────────────────
#
# SDV Architecture Simulation:
#
#   Real vehicle:  ECUs (CAN) → Central Gateway → Databroker → MQTT Bridge → Cloud
#   This file:     ECU Sim    → Kuksa Databroker → MQTT Bridge → Mosquitto
#
# Services:
#   databroker    — vehicle signal middleware (M1)
#   ecu-simulator — publishes ECU signals via gRPC (M1)
#   dashboard     — Streamlit live signal viewer (M1)
#   mosquitto     — MQTT broker, cloud exit point (M2)
#   mqtt-bridge   — subscribes Kuksa, forwards to Mosquitto (M2)
#
# Usage:
#   Start:         docker compose up
#   Stop:          docker compose down
#   Logs:          docker compose logs -f
#   Test V2C:      mosquitto_sub -h localhost -p 1883 -t "sdv/vehicle-001/#" -v

services:

  # ── M1: Kuksa Databroker ────────────────────────────────────────────────────
  #
  # Central vehicle middleware — single source of truth for all signal state.
  # SDV equivalent: Vehicle Abstraction Layer (VAL) on the Central Vehicle Computer.
  databroker:
    image: ghcr.io/eclipse/kuksa.val/databroker:0.4.4
    command: ["--vss", "/vss.json", "--insecure"]
    volumes:
      - ./config/vss/vss_mini_covesa.json:/vss.json:ro
    networks:
      - sdv-net
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/55555' 2>/dev/null && echo healthy || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: on-failure

  # ── M1: ECU Simulator ──────────────────────────────────────────────────────
  #
  # Simulates Powertrain ECU, Battery Management System, and HVAC Controller
  # publishing signals to the Databroker via gRPC.
  ecu-simulator:
    build:
      context: ./services/ecu-simulator
      dockerfile: Dockerfile
    environment:
      DATABROKER_HOST: databroker
      DATABROKER_PORT: "55555"
      UPDATE_INTERVAL_SEC: "1.0"
    depends_on:
      databroker:
        condition: service_healthy
    networks:
      - sdv-net
    restart: on-failure

  # ── M1: Streamlit Dashboard ─────────────────────────────────────────────────
  #
  # Live browser dashboard — polls Databroker and visualises vehicle signals.
  # SDV equivalent: HMI instrument cluster or cloud telemetry frontend.
  # Access: http://localhost:8501
  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      DATABROKER_HOST: databroker
      DATABROKER_PORT: "55555"
      # M2: provide MQTT info for sidebar display (dashboard does not connect
      # to Mosquitto directly — info only)
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      VEHICLE_ID: "vehicle-001"
    depends_on:
      databroker:
        condition: service_healthy
    networks:
      - sdv-net
    restart: on-failure

  # ── M2: Mosquitto MQTT Broker ───────────────────────────────────────────────
  #
  # Receives vehicle telemetry from the MQTT bridge and distributes it to
  # any number of cloud subscribers.
  #
  # SDV Concept:
  #   In production, this role is played by a managed cloud MQTT endpoint:
  #     AWS IoT Core  → mqtt.us-east-1.amazonaws.com:8883 (TLS)
  #     Azure IoT Hub → <hub>.azure-devices.net:8883 (TLS)
  #   Mosquitto is a local drop-in replacement with identical MQTT semantics.
  #   The mqtt-bridge requires zero code changes to point at a real cloud broker.
  #
  # Test from host (after docker compose up):
  #   mosquitto_sub -h localhost -p 1883 -t "sdv/vehicle-001/#" -v
  mosquitto:
    image: eclipse-mosquitto:2.0
    volumes:
      # Mosquitto requires a config file — without it the container exits.
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"               # Expose to host for CLI testing
    networks:
      - sdv-net
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/1883' 2>/dev/null && echo healthy || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: on-failure

  # ── M2: MQTT Bridge ─────────────────────────────────────────────────────────
  #
  # The V2C (Vehicle-to-Cloud) gateway service.
  # Subscribes to Kuksa Databroker via gRPC streaming (not polling — see main.py)
  # and publishes each signal update to Mosquitto as a JSON payload.
  #
  # SDV Concept:
  #   Crossing the vehicle / cloud boundary is architecturally significant.
  #   Inside the vehicle: gRPC, typed VSS signals, low latency, authenticated.
  #   Outside the vehicle: MQTT, JSON payloads, cloud-friendly, scalable.
  #   The bridge is the only component that crosses this boundary.
  mqtt-bridge:
    build:
      context: ./services/mqtt-bridge
      dockerfile: Dockerfile
    environment:
      DATABROKER_HOST: databroker
      DATABROKER_PORT: "55555"
      MQTT_HOST: mosquitto          # Docker DNS name of the Mosquitto service
      MQTT_PORT: "1883"
      VEHICLE_ID: "vehicle-001"     # Prefixes all MQTT topics: sdv/vehicle-001/...
    depends_on:
      databroker:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - sdv-net
    restart: on-failure

# ── Network ─────────────────────────────────────────────────────────────────
# All 5 services share one internal bridge network.
# Only :8501 (dashboard) and :1883 (MQTT test) are exposed to the host.
#
# SDV Concept:
#   Analogous to the separation between in-vehicle Ethernet (SOME/IP / DDS)
#   and the external cellular / V2X network interface.
networks:
  sdv-net:
    driver: bridge
