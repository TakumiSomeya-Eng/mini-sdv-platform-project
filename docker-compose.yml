# mini-sdv-platform — Milestone 3: ROS2 Integration
# ──────────────────────────────────────────────────────────────────────────────
#
# SDV Architecture Simulation:
#
#   Real vehicle:  ECUs (CAN) → Central Gateway → Databroker → MQTT Bridge → Cloud
#                                                            → ROS2 Bridge  → AD Stack
#   This file:     ECU Sim    → Kuksa Databroker → MQTT Bridge → Mosquitto
#                                                → ROS2 Bridge → ros2-subscriber
#
# Services:
#   databroker      — vehicle signal middleware (M1)
#   ecu-simulator   — publishes ECU signals via gRPC (M1)
#   dashboard       — Streamlit live signal viewer (M1)
#   mosquitto       — MQTT broker, cloud exit point (M2)
#   mqtt-bridge     — subscribes Kuksa, forwards to Mosquitto (M2)
#   ros2-bridge     — subscribes Kuksa, forwards to ROS2 topics via DDS (M3)
#   ros2-subscriber — ROS2 test subscriber, verifies DDS delivery (M3)
#
# Three-consumer pattern (M3 milestone):
#   One Databroker — three consumers — three protocols:
#     dashboard       → gRPC poll       → human UI
#     mqtt-bridge     → gRPC subscribe  → MQTT → cloud
#     ros2-bridge     → gRPC subscribe  → DDS  → autonomous driving stack
#
# Usage:
#   Start:              docker compose up
#   Stop:               docker compose down
#   Logs (all):         docker compose logs -f
#   Test V2C (MQTT):    mosquitto_sub -h localhost -p 1883 -t "sdv/vehicle-001/#" -v
#   Test AD (ROS2):     docker compose logs -f ros2-subscriber

# ── CycloneDDS unicast peer configuration (shared by all ROS2 services) ───────
#
# Docker bridge networks do not reliably forward multicast UDP between
# containers. CycloneDDS is configured here to use direct unicast peer
# discovery instead of multicast. Both ros2-bridge and ros2-subscriber
# list each other as peers so DDS discovery works without multicast.
#
# This config is injected as an environment variable (CYCLONEDDS_URI)
# using a YAML anchor to avoid duplicating the XML string.
x-cyclonedds-config: &cyclonedds-config
  CYCLONEDDS_URI: >-
    <CycloneDDS><Domain>
    <General><AllowMulticast>false</AllowMulticast></General>
    <Discovery><Peers>
    <Peer Address="ros2-bridge"/>
    <Peer Address="ros2-subscriber"/>
    </Peers></Discovery>
    </Domain></CycloneDDS>

services:

  # ── M1: Kuksa Databroker ────────────────────────────────────────────────────
  #
  # Central vehicle middleware — single source of truth for all signal state.
  # SDV equivalent: Vehicle Abstraction Layer (VAL) on the Central Vehicle Computer.
  #
  # M3 change: VSS catalog now uses COVESA VSS 4.x standard paths.
  databroker:
    image: ghcr.io/eclipse/kuksa.val/databroker:0.4.4
    command: ["--vss", "/vss.json", "--insecure"]
    volumes:
      - ./config/vss/vss_mini_covesa.json:/vss.json:ro
    networks:
      - sdv-net
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/55555' 2>/dev/null && echo healthy || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: on-failure

  # ── M1: ECU Simulator ──────────────────────────────────────────────────────
  #
  # Simulates Powertrain ECU, Battery Management System, and HVAC Controller
  # publishing signals to the Databroker via gRPC.
  #
  # M3 change: publishes to COVESA VSS 4.x standard paths.
  ecu-simulator:
    build:
      context: ./services/ecu-simulator
      dockerfile: Dockerfile
    environment:
      DATABROKER_HOST: databroker
      DATABROKER_PORT: "55555"
      UPDATE_INTERVAL_SEC: "1.0"
    depends_on:
      databroker:
        condition: service_healthy
    networks:
      - sdv-net
    restart: on-failure

  # ── M1: Streamlit Dashboard ─────────────────────────────────────────────────
  #
  # Live browser dashboard — polls Databroker and visualises vehicle signals.
  # SDV equivalent: HMI instrument cluster or cloud telemetry frontend.
  # Access: http://localhost:8501
  #
  # M3 change: reads from COVESA VSS 4.x standard paths.
  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      DATABROKER_HOST: databroker
      DATABROKER_PORT: "55555"
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      VEHICLE_ID: "vehicle-001"
    depends_on:
      databroker:
        condition: service_healthy
    networks:
      - sdv-net
    restart: on-failure

  # ── M2: Mosquitto MQTT Broker ───────────────────────────────────────────────
  #
  # Receives vehicle telemetry from the MQTT bridge and distributes it to
  # any number of cloud subscribers.
  #
  # SDV Concept:
  #   In production, this role is played by a managed cloud MQTT endpoint:
  #     AWS IoT Core  → mqtt.us-east-1.amazonaws.com:8883 (TLS)
  #     Azure IoT Hub → <hub>.azure-devices.net:8883 (TLS)
  #   Mosquitto is a local drop-in replacement with identical MQTT semantics.
  #   The mqtt-bridge requires zero code changes to point at a real cloud broker.
  #
  # Test from host (after docker compose up):
  #   mosquitto_sub -h localhost -p 1883 -t "sdv/vehicle-001/#" -v
  mosquitto:
    image: eclipse-mosquitto:2.0
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"
    networks:
      - sdv-net
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/1883' 2>/dev/null && echo healthy || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: on-failure

  # ── M2: MQTT Bridge ─────────────────────────────────────────────────────────
  #
  # The V2C (Vehicle-to-Cloud) gateway service.
  # Subscribes to Kuksa Databroker via gRPC streaming an