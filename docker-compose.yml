# mini-sdv-platform — Milestone 6: OTA Update Simulation
# ──────────────────────────────────────────────────────────────────────────────
#
# SDV Architecture Simulation:
#
#   Real vehicle:  ECUs (CAN) → Central Gateway → Databroker → MQTT Bridge → Cloud
#                                                            → ROS2 Bridge  → AD Stack
#   This file:     ECU Sim ─CAN─▶ vcan0 ─CAN─▶ CAN Gateway → Databroker → Dashboard
#                                                                         → MQTT Bridge → Mosquitto
#                                                                         → ROS2 Bridge → ros2-subscriber
#
# M4 execution environment:
#   All Docker services run inside WSL2 Ubuntu using Docker Engine (not Docker
#   Desktop). This gives direct access to the same Linux kernel as vcan0.
#   network_mode: host is used because dockerd runs with --iptables=false
#   (the custom 6.18 kernel is missing ip_tables.ko); host networking bypasses
#   NAT entirely — services bind directly to WSL2's loopback, and WSL2
#   automatically forwards those ports to Windows localhost.
#
# Services in Docker Compose (run from WSL2):
#   databroker      — vehicle signal middleware
#   dashboard       — Streamlit live signal viewer (M1)
#   mosquitto       — MQTT broker, cloud exit point (M2)
#   mqtt-bridge     — subscribes Kuksa, forwards to Mosquitto (M2)
#   ros2-bridge     — subscribes Kuksa, forwards to ROS2 topics via DDS (M3)
#   ros2-subscriber — ROS2 test subscriber, verifies DDS delivery (M3)
#   ai-monitor      — LLM-based signal anomaly agent (M5)
#   ota-server      — OTA package registry (M6)
#   ota-manager     — vehicle-side OTA update agent (M6)
#
# Services run directly in WSL2 (M4):
#   ecu-simulator   — sends CAN frames to vcan0 (services/ecu-simulator/main.py)
#   can-gateway     — reads vcan0, publishes to Databroker (services/can-gateway/main.py)
#
# Usage (all commands run in WSL2 Ubuntu terminal):
#   0. First-time setup:  bash scripts/setup-wsl2.sh
#   1. Start services:    docker compose up -d
#   2. Start gateway:     ~/sdv-venv/bin/python services/can-gateway/main.py
#   3. Start ECU:         ~/sdv-venv/bin/python services/ecu-simulator/main.py
#   4. Monitor CAN:       candump vcan0
#   5. Dashboard:         http://localhost:8501  (accessible from Windows browser)
#   Test V2C (MQTT):      mosquitto_sub -h localhost -p 1883 -t "sdv/vehicle-001/#" -v
#   Test AD (ROS2):       docker compose logs -f ros2-subscriber

# ── CycloneDDS config for host networking ─────────────────────────────────────
#
# With network_mode: host, all ROS2 services share WSL2's network namespace.
# DDS multicast works on the loopback interface — no unicast peer workaround needed.
x-cyclonedds-config: &cyclonedds-config
  CYCLONEDDS_URI: >-
    <CycloneDDS><Domain>
    <General><AllowMulticast>true</AllowMulticast></General>
    </Domain></CycloneDDS>

services:

  # ── M1: Kuksa Databroker ────────────────────────────────────────────────────
  #
  # Central vehicle middleware — single source of truth for all signal state.
  # SDV equivalent: Vehicle Abstraction Layer (VAL) on the Central Vehicle Computer.
  #
  # With host networking: binds to WSL2 localhost:55555
  # CAN Gateway (running in WSL2) connects via DATABROKER_HOST=localhost
  databroker:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:0.4.4
    command: ["--vss", "/vss.json", "--insecure"]
    volumes:
      - ./config/vss/vss_mini_covesa.json:/vss.json:ro
    network_mode: host
    restart: on-failure

  # ── M4: ECU Simulator — runs in WSL2, not Docker ───────────────────────────
  #
  # Moved out of Docker Compose in M4. The ECU Simulator now publishes
  # CAN frames to vcan0 (SocketCAN kernel interface) instead of gRPC.
  #
  # Run in WSL2:
  #   ~/sdv-venv/bin/python services/ecu-simulator/main.py

  # ── M1: Streamlit Dashboard ─────────────────────────────────────────────────
  #
  # Live browser dashboard — polls Databroker and visualises vehicle signals.
  # SDV equivalent: HMI instrument cluster or cloud telemetry frontend.
  # Access: http://localhost:8501 (Windows browser via WSL2 port forwarding)
  #
  # M3 change: reads from COVESA VSS 4.x standard paths.
  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    environment:
      DATABROKER_HOST: localhost
      DATABROKER_PORT: "55555"
      MQTT_HOST: localhost
      MQTT_PORT: "8883"
      MQTT_TLS: "true"
      MQTT_CA_CERT: /certs/ca.crt
      MQTT_CLIENT_CERT: /certs/dashboard.crt
      MQTT_CLIENT_KEY: /certs/dashboard.key
      VEHICLE_ID: "vehicle-001"
    volumes:
      - ./config/certs:/certs:ro
    depends_on:
      databroker:
        condition: service_started
    network_mode: host
    restart: on-failure

  # ── M2: Mosquitto MQTT Broker ───────────────────────────────────────────────
  #
  # Receives vehicle telemetry from the MQTT bridge and distributes it to
  # any number of cloud subscribers.
  #
  # SDV Concept:
  #   In production, this role is played by a managed cloud MQTT endpoint:
  #     AWS IoT Core  → mqtt.us-east-1.amazonaws.com:8883 (TLS)
  #     Azure IoT Hub → <hub>.azure-devices.net:8883 (TLS)
  #   Mosquitto is a local drop-in replacement with identical MQTT semantics.
  #
  # Test from WSL2 (or Windows via localhost):
  #   mosquitto_sub -h localhost -p 1883 -t "sdv/vehicle-001/#" -v
  mosquitto:
    image: eclipse-mosquitto:2.0
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./config/mosquitto/acl:/mosquitto/config/acl:ro
      - ./config/certs:/mosquitto/certs:ro
    network_mode: host
    restart: on-failure

  # ── M2: MQTT Bridge ─────────────────────────────────────────────────────────
  #
  # The V2C (Vehicle-to-Cloud) gateway service.
  # Subscribes to Kuksa Databroker via gRPC streaming and publishes each
  # signal update to Mosquitto as a JSON payload.
  #
  # SDV Concept:
  #   Inside the vehicle: gRPC, typed VSS signals, low latency.
  #   Outside the vehicle: MQTT, JSON payloads, cloud-friendly, scalable.
  #   The bridge is the only component that crosses this boundary.
  mqtt-bridge:
    build:
      context: ./services/mqtt-bridge
      dockerfile: Dockerfile
    environment:
      DATABROKER_HOST: localhost
      DATABROKER_PORT: "55555"
      MQTT_HOST: localhost
      MQTT_PORT: "8883"
      MQTT_TLS: "true"
      MQTT_CA_CERT: /certs/ca.crt
      MQTT_CLIENT_CERT: /certs/bridge.crt
      MQTT_CLIENT_KEY: /certs/bridge.key
      VEHICLE_ID: "vehicle-001"
      OTEL_ENABLED: "true"
      OTEL_ENDPOINT: "http://localhost:4318/v1/traces"
    volumes:
      - ./config/certs:/certs:ro
    depends_on:
      databroker:
        condition: service_started
      mosquitto:
        condition: service_started
    network_mode: host
    restart: on-failure

  # ── M3: ROS2 Bridge ─────────────────────────────────────────────────────────
  #
  # The AD-stack gateway service.
  # Subscribes to Kuksa Databroker via gRPC streaming (same pattern as
  # mqtt-bridge) and publishes each signal update as a ROS2 topic using DDS.
  #
  # SDV Concept:
  #   Two middleware paradigms coexist in modern SDV platforms:
  #     Kuksa / VSS  → vehicle signal layer (ECU integration, OBD, AUTOSAR)
  #     ROS2 / DDS   → autonomous driving layer (perception, planning, control)
  #   This bridge is the interface between the two worlds.
  #
  # ROS2 topics published:
  #   /vehicle/speed              ← Vehicle.Speed
  #   /vehicle/battery/soc        ← Vehicle.Powertrain.TractionBattery.StateOfCharge.Current
  #   /vehicle/cabin/temperature  ← Vehicle.Cabin.HVAC.AmbientAirTemperature
  #
  # DDS: CycloneDDS with multicast (works on shared loopback via host networking).
  ros2-bridge:
    build:
      context: ./services/ros2-bridge
      dockerfile: Dockerfile
    environment:
      DATABROKER_HOST: localhost
      DATABROKER_PORT: "55555"
      ROS_DOMAIN_ID: "0"
      <<: *cyclonedds-config
    depends_on:
      databroker:
        condition: service_started
    network_mode: host
    restart: on-failure

  # ── M3: ROS2 Subscriber ─────────────────────────────────────────────────────
  #
  # Verification-only service. Subscribes to all three /vehicle/* ROS2 topics
  # and logs each received message.
  #
  # Verify M3 end-to-end:
  #   docker compose logs -f ros2-subscriber
  #
  # Expected output:
  #   [/vehicle/speed] value=87.3
  #   [/vehicle/battery/soc] value=72.4
  #   [/vehicle/cabin/temperature] value=22.1
  #
  # Real-world equivalent: any ROS2-native AD node (path planner,
  # emergency-braking controller, sensor-fusion node) that subscribes
  # to /vehicle/speed or /vehicle/battery/soc to make driving decisions.
  ros2-subscriber:
    build:
      context: ./services/ros2-subscriber
      dockerfile: Dockerfile
    environment:
      ROS_DOMAIN_ID: "0"
      <<: *cyclonedds-config
    depends_on:
      ros2-bridge:
        condition: service_started
    network_mode: host
    restart: on-failure

  # ── M5: AI Signal Monitor ───────────────────────────────────────────────────
  #
  # Observe → Reason → Act loop using the Claude API.
  # Polls the Databroker every MONITOR_INTERVAL_SEC seconds, sends signal
  # history to claude-haiku-4-5, and publishes JSON alerts to Mosquitto
  # when the LLM detects an anomaly.
  #
  # SDV Concept:
  #   The AI monitoring layer sits above the signal pipeline and interprets
  #   multi-signal context rather than applying fixed threshold rules. This
  #   mirrors how OEM cloud safety monitors and in-vehicle AI assistants
  #   consume VSS signals in modern SDV architectures.
  #
  # Alert topic: sdv/vehicle-001/alerts/ai
  # Verify:      mosquitto_sub -h localhost -p 1883 -t "sdv/vehicle-001/alerts/ai" -v
  #
  # Requires: ANTHROPIC_API_KEY set in environment or .env file
  # ── M6: OTA Server ─────────────────────────────────────────────────────────
  #
  # Cloud-side OTA package registry.
  # Hosts versioned ECU config packages (tar.gz) and a version manifest.
  # The POST /release/{version} endpoint simulates a deployment engineer
  # promoting a new software version to the fleet.
  #
  # SDV Concept:
  #   In production: Eclipse hawkBit, Mender, or an OEM proprietary server.
  #   The manifest + package-URL + SHA-256 hash pattern is the core of
  #   UPTANE's image repository.
  #
  # Trigger an update:
  #   curl -X POST http://localhost:8080/release/1.1.0
  ota-server:
    build:
      context: ./services/ota-server
      dockerfile: Dockerfile
    volumes:
      - ./config/ota/packages:/packages:ro
      - ./config/ota:/manifest
    network_mode: host
    restart: on-failure

  # ── M6: OTA Manager ────────────────────────────────────────────────────────
  #
  # Vehicle-side OTA update agent.
  # Polls ota-server every POLL_INTERVAL_SEC seconds, downloads and verifies
  # packages, writes new ECU config, and reports status via MQTT.
  #
  # SDV Concept:
  #   In production: Mender client, GENIVI SOTA, or OEM OTA agent.
  #   Implements CHECK→DOWNLOAD→VERIFY→APPLY→REPORT (simplified UPTANE flow).
  #
  # Shared volume /tmp/sdv-ota:
  #   ota-manager writes ecu_config.json here (inside Docker = /shared/).
  #   ecu-simulator (WSL2 process) watches /tmp/sdv-ota/ecu_config.json.
  #   Both share the same WSL2 filesystem via bind mount.
  #
  # MQTT status topic: sdv/vehicle-001/ota/status
  ota-manager:
    build:
      context: ./services/ota-manager
      dockerfile: Dockerfile
    environment:
      OTA_SERVER_URL: http://localhost:8080
      MQTT_HOST: localhost
      MQTT_PORT: "8883"
      MQTT_TLS: "true"
      MQTT_CA_CERT: /certs/ca.crt
      MQTT_CLIENT_CERT: /certs/ota.crt
      MQTT_CLIENT_KEY: /certs/ota.key
      VEHICLE_ID: "vehicle-001"
      POLL_INTERVAL_SEC: "30"
      ECU_CONFIG_PATH: /shared/ecu_config.json
      OTEL_ENABLED: "true"
      OTEL_ENDPOINT: "http://localhost:4318/v1/traces"
    volumes:
      - /tmp/sdv-ota:/shared
      - ./config/certs:/certs:ro
    depends_on:
      - ota-server
      - mosquitto
    network_mode: host
    restart: on-failure

  # ── M7: InfluxDB ────────────────────────────────────────────────────────────
  #
  # Time-series database for persisting vehicle signal history.
  # Auto-initialized on first start via DOCKER_INFLUXDB_INIT_* env vars.
  #
  # SDV Concept:
  #   In production, a TCU or CVC telemetry agent streams VSS signals to a
  #   managed time-series DB (AWS Timestream, InfluxDB Cloud, TimescaleDB).
  #   Grafana — or an OEM analytics platform — queries the DB for trend
  #   analysis, fleet health monitoring, and OTA impact measurement.
  #
  # UI: http://localhost:8086  (admin / sdv-password)
  influxdb:
    image: influxdb:2.7
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: sdv-password
      DOCKER_INFLUXDB_INIT_ORG: sdv-org
      DOCKER_INFLUXDB_INIT_BUCKET: sdv
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: sdv-token-local
    network_mode: host
    restart: on-failure

  # ── M7: InfluxDB Writer ──────────────────────────────────────────────────────
  #
  # Subscribes to Kuksa Databroker (same gRPC pattern as mqtt-bridge) and
  # writes each signal update to InfluxDB as a time-series data point.
  #
  # Schema: measurement=vehicle_signals  tag=signal  field=value (float64)
  influxdb-writer:
    build:
      context: ./services/influxdb-writer
      dockerfile: Dockerfile
    environment:
      DATABROKER_HOST: localhost
      DATABROKER_PORT: "55555"
      INFLUXDB_URL: http://localhost:8086
      INFLUXDB_TOKEN: sdv-token-local
      INFLUXDB_ORG: sdv-org
      INFLUXDB_BUCKET: sdv
      VEHICLE_ID: "vehicle-001"
    depends_on:
      databroker:
        condition: service_started
      influxdb:
        condition: service_started
    network_mode: host
    restart: on-failure

  # ── M13: Grafana Tempo — Distributed Tracing Backend ──────────────────────────
  #
  # Receives traces from mqtt-bridge, ai-monitor, and ota-manager via OTLP/HTTP.
  # Replaces Jaeger (M12): Tempo is OTLP-compatible and integrates natively with
  # Grafana Explore for unified logs + metrics + traces (single pane of glass).
  #
  # SDV Concept:
  #   In production, distributed tracing reveals latency across microservices —
  #   e.g., how long a CAN frame takes from ECU → Databroker → MQTT → cloud.
  #   Tempo is preferred over Jaeger when Grafana is already in the stack because
  #   TraceQL queries and trace-to-metrics links are built-in.
  #
  # API:       http://localhost:3200
  # OTLP HTTP: localhost:4318 (same port as Jaeger — no service changes needed)
  # UI:        Grafana Explore → Tempo datasource
  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo.yaml:ro
    network_mode: host
    restart: on-failure

  # ── M7: Grafana ──────────────────────────────────────────────────────────────
  #
  # Visualises vehicle signal time-series from InfluxDB.
  # Datasource and dashboard are provisioned from config/grafana/ — no manual
  # UI setup required (Infrastructure as Code, DR-75).
  #
  # UI: http://localhost:3000  (Anonymous Access — no login required)
  grafana:
    image: grafana/grafana:10.4.3
    volumes:
      - ./config/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      influxdb:
        condition: service_started
    network_mode: host
    restart: on-failure

  # ── M9: Webhook Receiver ────────────────────────────────────────────────────
  #
  # Receives Grafana alert notifications (POST /webhook) and logs them.
  # Simulates a Slack / PagerDuty webhook for local development.
  #
  # SDV Concept:
  #   In production, vehicle anomaly alerts are routed to PagerDuty, OpsGenie,
  #   or a fleet management dashboard via webhook / API integration.
  #
  # Monitor: docker compose logs -f webhook-receiver
  webhook-receiver:
    build:
      context: ./services/webhook-receiver
      dockerfile: Dockerfile
    environment:
      PORT: "9000"
    network_mode: host
    restart: on-failure

  # ── M8: Fleet Simulator ─────────────────────────────────────────────────────
  #
  # Simulates vehicle-002 and vehicle-003 in parallel threads.
  # Each vehicle independently publishes Speed/BatterySoC/CabinTemp to
  # MQTT (sdv/{vehicle_id}/telemetry) and writes to InfluxDB.
  #
  # SDV Concept:
  #   In production, each physical vehicle runs its own Databroker + TCU.
  #   The cloud sees MQTT streams tagged with vehicle_id from many vehicles.
  #   This service simulates that cloud-side view without separate CAN buses.
  fleet-simulator:
    build:
      context: ./services/fleet-simulator
      dockerfile: Dockerfile
    environment:
      MQTT_HOST: localhost
      MQTT_PORT: "8883"
      MQTT_TLS: "true"
      MQTT_CA_CERT: /certs/ca.crt
      MQTT_CLIENT_CERT: /certs/fleet.crt
      MQTT_CLIENT_KEY: /certs/fleet.key
      INFLUXDB_URL: http://localhost:8086
      INFLUXDB_TOKEN: sdv-token-local
      INFLUXDB_ORG: sdv-org
      INFLUXDB_BUCKET: sdv
      INTERVAL_SEC: "2"
    volumes:
      - ./config/certs:/certs:ro
    depends_on:
      - mosquitto
      - influxdb
    network_mode: host
    restart: on-failure

  # ── M8: OTA Manager — vehicle-002 ───────────────────────────────────────────
  #
  # Reuses the ota-manager image with VEHICLE_ID=vehicle-002.
  # Polls the shared manifest independently and reports via sdv/vehicle-002/ota/status.
  ota-manager-v002:
    build:
      context: ./services/ota-manager
      dockerfile: Dockerfile
    environment:
      OTA_SERVER_URL: http://localhost:8080
      MQTT_HOST: localhost
      MQTT_PORT: "8883"
      MQTT_TLS: "true"
      MQTT_CA_CERT: /certs/ca.crt
      MQTT_CLIENT_CERT: /certs/ota.crt
      MQTT_CLIENT_KEY: /certs/ota.key
      VEHICLE_ID: "vehicle-002"
      POLL_INTERVAL_SEC: "30"
      ECU_CONFIG_PATH: /tmp/ecu_config_v002.json
      OTA_STATE_FILE: /tmp/ota_state_v002.json
    volumes:
      - ./config/certs:/certs:ro
    depends_on:
      - ota-server
      - mosquitto
    network_mode: host
    restart: on-failure

  # ── M8: OTA Manager — vehicle-003 ───────────────────────────────────────────
  ota-manager-v003:
    build:
      context: ./services/ota-manager
      dockerfile: Dockerfile
    environment:
      OTA_SERVER_URL: http://localhost:8080
      MQTT_HOST: localhost
      MQTT_PORT: "8883"
      MQTT_TLS: "true"
      MQTT_CA_CERT: /certs/ca.crt
      MQTT_CLIENT_CERT: /certs/ota.crt
      MQTT_CLIENT_KEY: /certs/ota.key
      VEHICLE_ID: "vehicle-003"
      POLL_INTERVAL_SEC: "30"
      ECU_CONFIG_PATH: /tmp/ecu_config_v003.json
      OTA_STATE_FILE: /tmp/ota_state_v003.json
    volumes:
      - ./config/certs:/certs:ro
    depends_on:
      - ota-server
      - mosquitto
    network_mode: host
    restart: on-failure

  # ── M5: AI Signal Monitor ───────────────────────────────────────────────────
  #
  ai-monitor:
    build:
      context: ./services/ai-monitor
      dockerfile: Dockerfile
    environment:
      DATABROKER_HOST: localhost
      DATABROKER_PORT: "55555"
      MQTT_HOST: localhost
      MQTT_PORT: "8883"
      MQTT_TLS: "true"
      MQTT_CA_CERT: /certs/ca.crt
      MQTT_CLIENT_CERT: /certs/ai.crt
      MQTT_CLIENT_KEY: /certs/ai.key
      VEHICLE_ID: "vehicle-001"
      MONITOR_INTERVAL_SEC: "10"
      HISTORY_WINDOW: "10"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OTEL_ENABLED: "true"
      OTEL_ENDPOINT: "http://localhost:4318/v1/traces"
    volumes:
      - ./config/certs:/certs:ro
    depends_on:
      databroker:
        condition: service_started
      mosquitto:
        condition: service_started
    network_mode: host
    restart: on-failure
